                bluetooth: { title: "Bluetooth Problem - Standard Guide", causes: ["🔵 WiFi/BT IC", "📡 Antenna", "💻 Software"], steps: ["STEP 1: Toggle BT", "STEP 2: Forget devices", "STEP 3: Reset Network", "STEP 4: Reheat combo IC"], tools: ["Multimeter", "Hot air gun"], warnings: ["Same IC as WiFi", "Replace if both fail"] },
                touch: { title: "Touch Problem - Standard Guide", causes: ["👆 Touch IC", "🖥️ Display", "💻 Software"], steps: ["STEP 1: Restart", "STEP 2: Remove protector", "STEP 3: Reseat connector", "STEP 4: Reheat Touch IC", "STEP 5: Replace display"], tools: ["Multimeter", "Hot air gun", "Plastic tools"], warnings: ["Check screen protector", "Ghost touches"] },
                battery: { title: "Battery Drain - Standard Guide", causes: ["🔋 Old battery", "📱 Apps", "🔧 Leakage"], steps: ["STEP 1: Check health", "STEP 2: Check apps", "STEP 3: Calibrate", "STEP 4: Check leakage", "STEP 5: Replace battery"], tools: ["Multimeter", "DC Supply"], warnings: ["Check swelling", "Replace if <80%"] },
                sim: { title: "SIM Not Detected - Standard Guide", causes: ["💳 SIM card", "📱 Tray", "🔧 SIM IC"], steps: ["STEP 1: Reinsert SIM", "STEP 2: Test different SIM", "STEP 3: Check tray", "STEP 4: Inspect pins", "STEP 5: Reheat SIM IC"], tools: ["Multimeter", "Hot air gun", "Microscope"], warnings: ["Don't bend pins", "Check both slots"] },
                fingerprint: { title: "Fingerprint Problem - Standard Guide", causes: ["🔐 Sensor", "🔌 Connector", "💻 Software"], steps: ["STEP 1: Delete and re-add", "STEP 2: Clean sensor", "STEP 3: Check connector", "STEP 4: Update software"], tools: ["Soft cloth", "Multimeter"], warnings: ["Clean sensor", "Screen protector affects"] },
                buttons: { title: "Button Problem - Standard Guide", causes: ["🔘 Button", "🧵 Flex", "🔌 Connector"], steps: ["STEP 1: Check feel", "STEP 2: Inspect flex", "STEP 3: Clean contacts", "STEP 4: Check continuity", "STEP 5: Replace flex"], tools: ["Multimeter", "Soldering iron", "Alcohol"], warnings: ["Flex tears easily", "Check all buttons"] }
            };
            return defaultGuides[faultId] || defaultGuides.charging;
        }

        function getRepairGuide(modelName, faultId) {
            if (modelGuideMap[modelName] && modelGuideMap[modelName][faultId]) {
                return modelGuideMap[modelName][faultId];
            }
            return getDefaultGuide(faultId);
        }

        // Navigation state
        let currentPage = "home";
        let currentBrand = null;
        let currentModel = null;

        function renderHome() {
            return `
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Search mobile model..." onkeyup="filterBrands()">
                </div>
                <h2 class="section-title">📱 Select Your Mobile Brand</h2>
                <div class="brands-grid">
                    ${brands.map(brand => `
                        <div class="brand-card" onclick="navigateToBrand('${brand.id}')">
                            <div class="brand-icon">${brand.icon}</div>
                            <h3>${brand.name}</h3>
                            <p>${brand.modelCount} Models Available</p>
                            <span class="model-count">View Models →</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderBrandPage(brandId) {
            const brand = brands.find(b => b.id === brandId);
            const brandModels = models[brandId] || [];
            return `
                <h2 class="section-title">${brand?.icon} ${brand?.name} - Models</h2>
                <div class="models-grid">
                    ${brandModels.map(model => `
                        <div class="model-card" onclick="navigateToModel('${brandId}', '${model.replace(/'/g, "\\'")}')">
                            <div class="model-name">${model}</div>
                            <div class="model-year">Click to see 15 faults →</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderFaultsPage(brandId, modelName) {
            return `
                <div class="repair-header">
                    <h2>📱 ${modelName}</h2>
                    <p>Select the fault you are experiencing (15 faults available)</p>
                </div>
                <div class="faults-grid">
                    ${faultsList.map(fault => `
                        <div class="fault-card" onclick="navigateToRepair('${brandId}', '${modelName.replace(/'/g, "\\'")}', '${fault.id}')">
                            <div class="fault-icon">${fault.icon}</div>
                            <div class="fault-info">
                                <h4>${fault.name}</h4>
                                <p>${fault.desc}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderRepairPage(brandId, modelName, faultId) {
            const guide = getRepairGuide(modelName, faultId);
            const fault = faultsList.find(f => f.id === faultId);
            
            return `
                <div class="repair-header">
                    <h2>📱 ${modelName}</h2>
                    <p>${fault?.name || faultId} - Complete Model-Specific Repair Guide</p>
                </div>
                
                <div class="diagnosis-box">
                    <h3>🔍 EXPERT DIAGNOSIS - ${modelName}</h3>
                    <p><strong>Problem:</strong> ${fault?.desc || "Mobile fault"}</p>
                    <p style="margin-top: 10px;"><strong>Guide:</strong> ${guide.title}</p>
                </div>
                
                <div class="possible-causes">
                    <h3>📋 POSSIBLE CAUSES (Check in this order)</h3>
                    <ul class="cause-list">
                        ${guide.causes.map(cause => `<li>🔹 ${cause}</li>`).join('')}
                    </ul>
                </div>
                
                <h3 style="margin: 20px 0 15px 0; color: #c0392b;">🛠️ STEP-BY-STEP REPAIR PROCEDURE</h3>
                
                ${guide.steps.map((step, index) => `
                    <div class="step">
                        <div class="step-title">📌 ${step.split(':')[0] || `Step ${index + 1}`}</div>
                        <div class="step-text">${step}</div>
                    </div>
                `).join('')}
                
                <div class="tools-box">
                    <h3>🔧 TOOLS REQUIRED</h3>
                    <p>${guide.tools.join(' • ')}</p>
                </div>
                
                <div class="warning-box">
                    <h3>⚠️ IMPORTANT WARNINGS</h3>
                    <ul>
                        ${guide.warnings.map(warning => `<li>⚠️ ${warning}</li>`).join('')}
                    </ul>
                </div>
                
                <div style="background: #e8f4f8; border-radius: 15px; padding: 15px; margin-top: 20px; text-align: center;">
                    <p style="color: #2980b9;">💡 <strong>${modelName} Pro Tip:</strong> Always start with the simplest fix first. Most problems are solved by cleaning!</p>
                </div>
            `;
        }

        function updateBackButton() {
            const container = document.getElementById('backBtnContainer');
            if (!container) return;
            if (currentPage === 'home') { container.innerHTML = ''; return; }
            let backAction = '';
            if (currentPage === 'brand') backAction = 'navigateToHome()';
            else if (currentPage === 'faults') backAction = `navigateToBrand('${currentBrand}')`;
            else if (currentPage === 'repair') backAction = `navigateToModel('${currentBrand}', '${currentModel?.replace(/'/g, "\\'")}')`;
            container.innerHTML = `<button class="back-btn" onclick="${backAction}">⬅ Back</button>`;
        }

        function navigateToHome() { currentPage = 'home'; currentBrand = null; currentModel = null; document.getElementById('mainContent').innerHTML = renderHome(); updateBackButton(); window.scrollTo(0,0); }
        function navigateToBrand(brandId) { currentPage = 'brand'; currentBrand = brandId; document.getElementById('mainContent').innerHTML = renderBrandPage(brandId); updateBackButton(); window.scrollTo(0,0); }
        function navigateToModel(brandId, modelName) { currentPage = 'faults'; currentBrand = brandId; currentModel = modelName; document.getElementById('mainContent').innerHTML = renderFaultsPage(brandId, modelName); updateBackButton(); window.scrollTo(0,0); }
        function navigateToRepair(brandId, modelName, faultId) { currentPage = 'repair'; currentBrand = brandId; currentModel = modelName; currentFault = faultId; document.getElementById('mainContent').innerHTML = renderRepairPage(brandId, modelName, faultId); updateBackButton(); window.scrollTo(0,0); }

        function filterBrands() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            document.querySelectorAll('.brand-card').forEach(card => {
                const name = card.querySelector('h3')?.innerText.toLowerCase() || '';
                card.style.display = name.includes(searchTerm) ? 'block' : 'none';
            });
        }

        window.navigateToHome = navigateToHome;
        window.navigateToBrand = navigateToBrand;
        window.navigateToModel = navigateToModel;
        window.navigateToRepair = navigateToRepair;
        window.filterBrands = filterBrands;

        navigateToHome();
    </script>
</body>
</html>
