                <div style="margin-top: 40px; padding: 20px; background: #f8f9fa; border-radius: 15px;">
                    <h3 style="color: #e94560;">📱 About Karachi Mobile Repairing Master</h3>
                    <p style="margin-top: 10px; line-height: 1.6;">Welcome to Karachi Mobile Repairing Master - Pakistan's most trusted mobile repairing guide. We provide professional, step-by-step diagnosis and repair tutorials for all mobile brands including Apple iPhone, Samsung, Techno, Infinix, Xiaomi, Oppo, Vivo, Realme, OnePlus, Google Pixel, and Motorola. Learn to fix charging problems, dead mobiles, speaker issues, microphone faults, network signal loss, water damage, display problems, and more. Each guide includes exact voltage readings, component testing procedures, and professional repair techniques used by expert technicians.</p>
                </div>
            `;
        }

        function renderBrand(brandId) {
            const brand = brands.find(b => b.id === brandId);
            if (!brand) return renderHome();
            
            const brandModels = models[brandId] || [];
            
            return `
                <h2 class="section-title">${brand.icon} ${brand.name} - All Models</h2>
                <div class="models-grid">
                    ${brandModels.map(model => `
                        <a href="/model/${brandId}/${slugify(model)}" class="model-card" onclick="event.preventDefault(); navigateTo('/model/${brandId}/${slugify(model)}')">
                            <div class="model-name">${model}</div>
                            <span class="model-sub">Click to see faults →</span>
                        </a>
                    `).join('')}
                </div>
                <div style="margin-top: 30px; padding: 15px; background: #f8f9fa; border-radius: 15px;">
                    <p>📱 Complete repair guides for all ${brand.name} models. Select your model above to get started with professional diagnosis.</p>
                </div>
            `;
        }

        function renderModel(brandId, modelSlug) {
            const brand = brands.find(b => b.id === brandId);
            const modelName = getModelNameFromSlug(brandId, modelSlug);
            if (!brand || !modelName) return renderHome();
            
            return `
                <h2 class="section-title">📱 ${modelName}</h2>
                <p style="margin-bottom: 20px; color: #7f8c8d;">Select the fault you are experiencing with your ${modelName}</p>
                <div class="faults-grid">
                    ${faultsList.map(fault => `
                        <a href="/repair/${brandId}/${modelSlug}/${fault.slug}" class="fault-card" onclick="event.preventDefault(); navigateTo('/repair/${brandId}/${modelSlug}/${fault.slug}')">
                            <div class="fault-icon">${fault.icon}</div>
                            <div class="fault-info">
                                <h4>${fault.name}</h4>
                                <p>${fault.desc}</p>
                            </div>
                        </a>
                    `).join('')}
                </div>
            `;
        }

        function renderRepair(brandId, modelSlug, faultSlug) {
            const brand = brands.find(b => b.id === brandId);
            const modelName = getModelNameFromSlug(brandId, modelSlug);
            const fault = getFaultFromSlug(faultSlug);
            const data = getDiagnostic(fault.id);
            
            if (!brand || !modelName) return renderHome();
            
            return `
                <div class="diagnostic-header">
                    <h2>📱 ${modelName}</h2>
                    <h3 style="color: #e94560;">${fault.name}</h3>
                    <p>${data.title}</p>
                </div>
                
                <h3 style="margin: 20px 0; color: #16213e;">🔧 STEP-BY-STEP PROFESSIONAL DIAGNOSIS</h3>
                
                ${data.steps.map((step, idx) => `
                    <div class="diagnostic-step">
                        <div class="step-header" onclick="toggleStep(${idx})">
                            <div>
                                <span class="step-number">${step.number}</span>
                                <strong>${step.title}</strong>
                            </div>
                            <span>▼</span>
                        </div>
                        <div class="step-body" id="step-${idx}">
                            <p style="margin-bottom: 12px;">${step.content}</p>
                            ${step.readings ? step.readings.map(r => `
                                <div class="reading-box ${r.type === 'success' ? 'reading-success' : (r.type === 'fail' ? 'reading-fail' : '')}">
                                    ${r.text}
                                    ${r.value ? `<div class="reading-value">📊 Expected Reading: ${r.value}</div>` : ''}
                                </div>
                            `).join('') : ''}
                            ${step.image ? `<div class="component-img">${step.image}</div>` : ''}
                        </div>
                    </div>
                `).join('')}
                
                <div style="background: #16213e; color: white; padding: 20px; border-radius: 20px; margin: 20px 0;">
                    <h3 style="color: #e94560; margin-bottom: 12px;">🔧 TOOLS REQUIRED</h3>
                    <div>${data.tools.map(t => `<span class="tool-tag">${t}</span>`).join('')}</div>
                </div>
                
                <div class="warning-box">
                    <h3>⚠️ IMPORTANT WARNINGS</h3>
                    <ul style="padding-left: 20px; margin-top: 10px;">
                        ${data.warnings.map(w => `<li style="margin: 5px 0;">${w}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="pro-tip">
                    <h3>💡 PRO TIP</h3>
                    <p>Always start with the simplest and cheapest fix first. Most problems are solved by cleaning or checking loose connections. Don't rush to replace expensive components!</p>
                </div>
            `;
        }

        function renderBreadcrumb() {
            const route = getRoute();
            const container = document.getElementById('breadcrumb');
            if (!container) return;
            
            let html = `<a href="/" onclick="event.preventDefault(); navigateTo('/')">Home</a>`;
            
            if (route.type === 'brand') {
                const brand = brands.find(b => b.id === route.brandId);
                if (brand) html += `<span>›</span><a href="/brand/${route.brandId}" onclick="event.preventDefault(); navigateTo('/brand/${route.brandId}')">${brand.name}</a>`;
            }
            else if (route.type === 'model') {
                const brand = brands.find(b => b.id === route.brandId);
                const modelName = getModelNameFromSlug(route.brandId, route.modelSlug);
                if (brand) html += `<span>›</span><a href="/brand/${route.brandId}" onclick="event.preventDefault(); navigateTo('/brand/${route.brandId}')">${brand.name}</a>`;
                if (modelName) html += `<span>›</span><span>${modelName}</span>`;
            }
            else if (route.type === 'repair') {
                const brand = brands.find(b => b.id === route.brandId);
                const modelName = getModelNameFromSlug(route.brandId, route.modelSlug);
                const fault = getFaultFromSlug(route.faultId);
                if (brand) html += `<span>›</span><a href="/brand/${route.brandId}" onclick="event.preventDefault(); navigateTo('/brand/${route.brandId}')">${brand.name}</a>`;
                if (modelName) html += `<span>›</span><a href="/model/${route.brandId}/${route.modelSlug}" onclick="event.preventDefault(); navigateTo('/model/${route.brandId}/${route.modelSlug}')">${modelName}</a>`;
                if (fault) html += `<span>›</span><span>${fault.name}</span>`;
            }
            
            container.innerHTML = html;
        }

        function render() {
            const route = getRoute();
            const contentDiv = document.getElementById('mainContent');
            
            if (route.type === 'home') contentDiv.innerHTML = renderHome();
            else if (route.type === 'brand') contentDiv.innerHTML = renderBrand(route.brandId);
            else if (route.type === 'model') contentDiv.innerHTML = renderModel(route.brandId, route.modelSlug);
            else if (route.type === 'repair') contentDiv.innerHTML = renderRepair(route.brandId, route.modelSlug, route.faultId);
            else contentDiv.innerHTML = renderHome();
            
            renderBreadcrumb();
            window.scrollTo(0, 0);
        }

        function toggleStep(index) {
            const step = document.getElementById(`step-${index}`);
            if (step) step.classList.toggle('active');
        }

        window.navigateTo = navigateTo;
        window.toggleStep = toggleStep;
        window.filterBrands = function() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const cards = document.querySelectorAll('.brand-card');
            cards.forEach(card => {
                const name = card.querySelector('h3')?.innerText.toLowerCase() || '';
                card.style.display = name.includes(searchTerm) ? 'block' : 'none';
            });
        };

        window.onpopstate = render;
        render();
    </script>
</body>
</html>
