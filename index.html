        // Default repair data
        const defaultRepair = {
            title: "Repair Guide - Complete Expert Diagnosis",
            possibleCauses: [
                "🔧 Component failure due to age or damage",
                "🔌 Loose or disconnected cable/connector",
                "🧵 Broken track on PCB",
                "⚡ Short circuit in related components",
                "💻 Software or firmware corruption"
            ],
            steps: [
                "✅ STEP 1: Inspect physical condition of the component - any visible damage?",
                "✅ STEP 2: Check all related connectors - are they properly seated?",
                "✅ STEP 3: Clean the area with isopropyl alcohol.",
                "✅ STEP 4: Test with multimeter for continuity on related tracks.",
                "✅ STEP 5: Check for short circuits on power and signal lines.",
                "✅ STEP 6: Replace faulty component if identified.",
                "✅ STEP 7: Test thoroughly after repair.",
                "✅ STEP 8: If problem persists, seek professional help."
            ],
            tools: ["Multimeter", "Soldering iron", "Hot air gun", "Tweezers", "Isopropyl alcohol", "Magnifying glass"],
            warnings: [
                "Always disconnect battery before working on motherboard",
                "Use proper ESD protection to avoid static damage",
                "Don't apply too much heat - can damage nearby components",
                "Take photos before disassembly for reference"
            ]
        };

        function getRepairData(faultId) {
            return repairData[faultId] || defaultRepair;
        }

        // Navigation state
        let currentPage = "home";
        let currentBrand = null;
        let currentModel = null;

        // Render functions
        function renderHome() {
            return `
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 Search mobile model... (e.g., iPhone 16, Samsung S24)" onkeyup="filterBrands()">
                </div>
                <h2 class="section-title">📱 Select Your Mobile Brand</h2>
                <div class="brands-grid" id="brandsGrid">
                    ${brands.map(brand => `
                        <div class="brand-card" onclick="navigateToBrand('${brand.id}')">
                            <div class="brand-icon">${brand.icon}</div>
                            <h3>${brand.name}</h3>
                            <p>${brand.modelCount} Models Available</p>
                            <span class="model-count">View Models →</span>
                        </div>
                    `).join('')}
                </div>
                <div class="seo-text">
                    <h3 style="color: #c0392b; margin-bottom: 10px;">📱 Karachi Mobile Repairing Master - Complete Phone Repair Guide</h3>
                    <p>Welcome to Karachi Mobile Repairing Master, your complete resource for professional mobile phone repairing. We provide detailed step-by-step guides for fixing common mobile phone problems including charging issues, speaker problems, microphone faults, network signal loss, dead mobile devices, water damage, display issues, camera problems, and more. Our guides cover 50+ popular mobile models from Apple iPhone, Samsung, Techno, Infinix, Xiaomi, Oppo, Vivo, Realme, OnePlus, Google Pixel, and Motorola. Whether you're a beginner or an experienced technician, our expert repair tutorials will help you diagnose and fix any mobile phone problem.</p>
                    <p style="margin-top: 10px;">Learn mobile repairing online for free. Our guides include possible causes, step-by-step diagnosis, tools required, and important safety warnings. Start learning today and become a professional mobile repair technician!</p>
                </div>
            `;
        }

        function renderBrandPage(brandId) {
            const brand = brands.find(b => b.id === brandId);
            const brandModels = models[brandId] || [];
            
            return `
                <h2 class="section-title">${brand?.icon || "📱"} ${brand?.name || brandId} - Models</h2>
                <div class="models-grid">
                    ${brandModels.map(model => `
                        <div class="model-card" onclick="navigateToModel('${brandId}', '${model.replace(/'/g, "\\'")}')">
                            <div class="model-name">${model}</div>
                            <div class="model-year">Click to see faults →</div>
                        </div>
                    `).join('')}
                </div>
                <div class="seo-text">
                    <h3 style="color: #c0392b; margin-bottom: 10px;">${brand?.name} Repair Guides</h3>
                    <p>Complete repair guides for all ${brand?.name} models. Learn how to fix charging problems, speaker issues, dead mobile, water damage, network signal problems, display issues, and more for your ${brand?.name} device.</p>
                </div>
            `;
        }

        function renderFaultsPage(brandId, modelName) {
            return `
                <div class="repair-header">
                    <h2>📱 ${modelName}</h2>
                    <p>Select the fault you are experiencing</p>
                </div>
                <div class="faults-grid">
                    ${faultsList.map(fault => `
                        <div class="fault-card" onclick="navigateToRepair('${brandId}', '${modelName.replace(/'/g, "\\'")}', '${fault.id}')">
                            <div class="fault-icon">${fault.icon}</div>
                            <div class="fault-info">
                                <h4>${fault.name}</h4>
                                <p>${fault.desc}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderRepairPage(brandId, modelName, faultId) {
            const fault = faultsList.find(f => f.id === faultId);
            const data = getRepairData(faultId);
            
            return `
                <div class="repair-header">
                    <h2>📱 ${modelName}</h2>
                    <p>${fault?.name || faultId} - Complete Repair Guide</p>
                </div>
                
                <div class="diagnosis-box">
                    <h3>🔍 EXPERT DIAGNOSIS</h3>
                    <p><strong>Problem:</strong> ${fault?.desc || "Mobile fault"}</p>
                    <p style="margin-top: 10px;"><strong>Guide:</strong> ${data.title}</p>
                </div>
                
                <div class="possible-causes">
                    <h3>📋 POSSIBLE CAUSES (Check in this order)</h3>
                    <ul class="cause-list">
                        ${data.possibleCauses.map(cause => `<li>🔹 ${cause}</li>`).join('')}
                    </ul>
                </div>
                
                <h3 style="margin: 20px 0 15px 0; color: #c0392b;">🛠️ STEP-BY-STEP REPAIR PROCEDURE</h3>
                
                ${data.steps.map((step, index) => `
                    <div class="step">
                        <div class="step-title">
                            <span>📌 ${step.split(':')[0] || `Step ${index + 1}`}</span>
                        </div>
                        <div class="step-content">
                            <div class="step-text">${step}</div>
                            <div class="step-img">
                                <img src="https://picsum.photos/id/${30 + index}/400/250" alt="${fault?.name} repair step ${index+1}">
                            </div>
                        </div>
                    </div>
                `).join('')}
                
                <div class="tools-box">
                    <h3>🔧 TOOLS REQUIRED</h3>
                    <p>${data.tools.join(' • ')}</p>
                </div>
                
                <div class="warning-box">
                    <h3>⚠️ IMPORTANT WARNINGS</h3>
                    <ul>
                        ${data.warnings.map(warning => `<li>⚠️ ${warning}</li>`).join('')}
                    </ul>
                </div>
                
                <div style="background: #e8f4f8; border-radius: 15px; padding: 15px; margin-top: 20px; text-align: center;">
                    <p style="color: #2980b9;">💡 <strong>Pro Tip:</strong> Always start with the simplest and cheapest fix first. Most problems are solved by cleaning or loose connections!</p>
                </div>
            `;
        }

        // Navigation functions
        function updateBackButton() {
            const container = document.getElementById('backBtnContainer');
            if (!container) return;
            
            if (currentPage === 'home') {
                container.innerHTML = '';
                return;
            }
            
            let backAction = '';
            let backText = '⬅ Back';
            
            if (currentPage === 'brand') {
                backAction = 'navigateToHome()';
                backText = '⬅ Back to Brands';
            } else if (currentPage === 'faults') {
                backAction = `navigateToBrand('${currentBrand}')`;
                backText = '⬅ Back to Models';
            } else if (currentPage === 'repair') {
                backAction = `navigateToModel('${currentBrand}', '${currentModel?.replace(/'/g, "\\'")}')`;
                backText = '⬅ Back to Faults';
            }
            
            container.innerHTML = `<button class="back-btn" onclick="${backAction}">${backText}</button>`;
        }

        function navigateToHome() {
            currentPage = 'home';
            currentBrand = null;
            currentModel = null;
            document.getElementById('mainContent').innerHTML = renderHome();
            updateBackButton();
            window.scrollTo(0, 0);
        }

        function navigateToBrand(brandId) {
            currentPage = 'brand';
            currentBrand = brandId;
            currentModel = null;
            document.getElementById('mainContent').innerHTML = renderBrandPage(brandId);
            updateBackButton();
            window.scrollTo(0, 0);
        }

        function navigateToModel(brandId, modelName) {
            currentPage = 'faults';
            currentBrand = brandId;
            currentModel = modelName;
            document.getElementById('mainContent').innerHTML = renderFaultsPage(brandId, modelName);
            updateBackButton();
            window.scrollTo(0, 0);
        }

        function navigateToRepair(brandId, modelName, faultId) {
            currentPage = 'repair';
            currentBrand = brandId;
            currentModel = modelName;
            document.getElementById('mainContent').innerHTML = renderRepairPage(brandId, modelName, faultId);
            updateBackButton();
            window.scrollTo(0, 0);
        }

        function filterBrands() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const brandCards = document.querySelectorAll('.brand-card');
            
            if (searchTerm === '') {
                brandCards.forEach(card => card.style.display = 'block');
                return;
            }
            
            brandCards.forEach(card => {
                const brandName = card.querySelector('h3')?.innerText.toLowerCase() || '';
                if (brandName.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        // Make functions global
        window.navigateToHome = navigateToHome;
        window.navigateToBrand = navigateToBrand;
        window.navigateToModel = navigateToModel;
        window.navigateToRepair = navigateToRepair;
        window.filterBrands = filterBrands;
        
        // Initialize
        navigateToHome();
    </script>
</body>
</html>
